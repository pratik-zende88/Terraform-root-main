# .github/workflows/terraform.yml

name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Select the environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      action:
        description: 'Select the Terraform action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      branch:
        description: 'Enter the Git branch to deploy'
        required: false
        default: 'main'

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.env }})
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: pratikzende882002-hash/Terraform-root-main
          ref: ${{ github.event.inputs.branch }}

      - name: Clean Terraform Cache
        run: rm -rf .terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Version
        run: terraform version

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="key=${{ github.event.inputs.env }}/terraform.tfstate"

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -var-file="envs/${{ github.event.inputs.env }}.tfvars"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -var-file="envs/${{ github.event.inputs.env }}.tfvars"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -var-file="envs/${{ github.event.inputs.env }}.tfvars"
